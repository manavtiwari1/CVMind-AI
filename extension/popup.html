<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVmind Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="logo">
        <span class="sparkle">✨</span> CVmind AI
      </div>
      <div class="subtitle">Autofill Copilot</div>
    </div>

    <div class="card">
      <div id="sync-status" class="status-box empty">
        No profile synced yet. Please log into CVmind web dashboard and click sync.
      </div>

      <div id="profile-details" class="profile-details hidden">
        <div class="detail-row">
          <span class="label">Candidate:</span>
          <span id="candidate-name" class="val">-</span>
        </div>
        <div class="detail-row">
          <span class="label">Email:</span>
          <span id="candidate-email" class="val">-</span>
        </div>
        <div class="detail-row">
          <span class="label">Experience:</span>
          <span id="candidate-exp" class="val">-</span>
        </div>
      </div>

      <button id="sync-btn" class="btn-primary">Sync from Tab</button>
    </div>

    <div class="footer">
      Connected to CVmind Dashboard
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
